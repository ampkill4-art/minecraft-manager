# ServiceManagement Configuration

# The URL to your broker (e.g., nats://nats:4222)
broker-url: "nats://hopper.proxy.rlwy.net:34270"

# Subject prefix (matches bridge config)
subject-prefix: "mc"

# Shared token for bridge -> plugin commands (optional but recommended)
bridge-token: ""

# A unique identifier for this specific Minecraft server instance
server-id: "my-paper-server"

# How often to send status updates (TPS, memory, players) to the dashboard (in seconds)
status-interval-seconds: 5

# How often to send a heartbeat ping to the dashboard (in seconds)
heartbeat-interval-seconds: 10

# Module toggles
enable-chat-bridge: true
enable-file-access: true
enable-backups: true

# Backup config
backup-directory: "backups"
max-backups: 10

# Command safety
# If allowlist is empty -> all commands allowed except denylist.
command-allowlist: []
command-denylist: []
max-command-length: 200

# File read safety (bytes)
max-file-read-bytes: 262144
max-file-write-bytes: 262144

# Chat command controls
chat-command-prefix: "#"
chat-command-allowlist:
  - op
  - deop
  - kick
  - ban
  - say
  - whitelist
  - crash
  - boom
  - freeze

# UUIDs allowed to run chat commands
privileged-players: []
